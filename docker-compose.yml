services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    command: streamlit run dashboard/app.py --server.address 0.0.0.0 --server.port 8501

  # Optional Postgres — set DB_URL=postgresql://mie:mie@db:5432/mie in .env to use it.
